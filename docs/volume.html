<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声の大きさ測定器 (Voice Volume Meter)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .meter-gradient {
            background: linear-gradient(to right, #4ade80, #facc15, #ef4444);
        }
        .transition-all {
            transition: all 0.05s ease-out;
        }
        /* ピークホールドのアニメーション */
        @keyframes peak-fade {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full bg-slate-800 rounded-3xl shadow-2xl p-8 border border-slate-700">
        <h1 class="text-2xl font-bold text-center mb-6 text-blue-400">声の大きさ測定器</h1>

        <!-- ステータス表示 -->
        <div id="statusMessage" class="text-sm text-center mb-6 py-2 px-4 bg-slate-700 rounded-full text-slate-300 transition-colors">
            「測定開始」ボタンを押してマイクを許可してください
        </div>

        <!-- メイン数値表示 -->
        <div class="text-center mb-8">
            <div class="text-sm text-slate-400 uppercase tracking-widest mb-1">Current Level</div>
            <div class="flex items-baseline justify-center gap-2">
                <div class="text-7xl font-black tabular-nums tracking-tighter" id="dbDisplay">0</div>
                <div class="text-slate-500 font-medium text-xl">dB</div>
            </div>
        </div>

        <!-- ビジュアルメーター -->
        <div class="relative h-10 w-full bg-slate-900 rounded-xl overflow-hidden mb-8 border-2 border-slate-700 shadow-inner">
            <!-- 背景のグリッド -->
            <div class="absolute inset-0 flex justify-between px-1 pointer-events-none z-10">
                <div class="border-l border-white/10 h-full w-px"></div>
                <div class="border-l border-white/10 h-full w-px"></div>
                <div class="border-l border-white/10 h-full w-px"></div>
                <div class="border-l border-white/10 h-full w-px"></div>
                <div class="border-l border-white/20 h-full w-px"></div> <!-- 50% line -->
                <div class="border-l border-white/10 h-full w-px"></div>
                <div class="border-l border-white/10 h-full w-px"></div>
                <div class="border-l border-white/10 h-full w-px"></div>
                <div class="border-l border-white/10 h-full w-px"></div>
            </div>
            
            <!-- メーター本体 -->
            <div id="meterBar" class="absolute top-0 left-0 h-full w-0 meter-gradient transition-all duration-75"></div>
            
            <!-- 100%ライン（警告線） -->
            <div class="absolute top-0 left-[71.4%] h-full w-0.5 bg-red-500/50 z-20"></div> 
        </div>

        <!-- 統計データ -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-slate-700/30 p-4 rounded-2xl text-center border border-slate-600/50">
                <div class="text-xs text-slate-400 mb-1">最大音量 (Peak)</div>
                <div class="text-3xl font-bold text-yellow-400 tabular-nums" id="maxDisplay">0</div>
            </div>
            <div class="bg-slate-700/30 p-4 rounded-2xl text-center border border-slate-600/50">
                <div class="text-xs text-slate-400 mb-1">平均音量 (Avg)</div>
                <div class="text-3xl font-bold text-blue-400 tabular-nums" id="avgDisplay">0</div>
            </div>
        </div>

        <!-- コントロールボタン -->
        <div class="flex flex-col gap-3">
            <button id="toggleBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 active:scale-[0.98] transition-all rounded-2xl font-bold text-lg shadow-lg shadow-blue-900/40">
                測定開始
            </button>
            <button id="resetBtn" class="w-full py-2 text-slate-500 hover:text-slate-300 transition-colors text-sm font-medium">
                データをリセット
            </button>
        </div>

        <!-- ガイド（100以上の目安を追加） -->
        <div class="mt-8 pt-6 border-t border-slate-700">
            <h2 class="text-sm font-semibold text-slate-400 mb-3 flex justify-between">
                <span>音量の目安:</span>
                <span class="text-[10px] text-slate-500">※環境により異なります</span>
            </h2>
            <div class="grid grid-cols-2 gap-x-4 gap-y-2 text-[11px]">
                <div class="flex justify-between border-b border-slate-700/50 pb-1">
                    <span class="text-slate-400">30以下</span><span class="text-slate-500 text-right">ささやき</span>
                </div>
                <div class="flex justify-between border-b border-slate-700/50 pb-1">
                    <span class="text-slate-400">40-60</span><span class="text-slate-500 text-right">普通の会話</span>
                </div>
                <div class="flex justify-between border-b border-slate-700/50 pb-1">
                    <span class="text-slate-400">70-90</span><span class="text-slate-500 text-right">騒々しい場所</span>
                </div>
                <div class="flex justify-between border-b border-slate-700/50 pb-1">
                    <span class="text-yellow-500 font-bold text-right">100-110</span><span class="text-slate-500 text-right">叫び声・電車</span>
                </div>
                <div class="flex justify-between border-b border-slate-700/50 pb-1">
                    <span class="text-red-500 font-bold text-right">120-140</span><span class="text-slate-500 text-right">飛行機のエンジン</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let animationId = null;
        let isMeasuring = false;

        // 統計用
        let maxVolume = 0;
        let totalVolume = 0;
        let samples = 0;

        const toggleBtn = document.getElementById('toggleBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusMessage = document.getElementById('statusMessage');
        const meterBar = document.getElementById('meterBar');
        const dbDisplay = document.getElementById('dbDisplay');
        const maxDisplay = document.getElementById('maxDisplay');
        const avgDisplay = document.getElementById('avgDisplay');

        async function startMeasurement() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // マイクの設定（エコー除去などを無効化して生に近い音を取る）
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }, 
                    video: false 
                });
                
                microphone = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 512; 
                analyser.smoothingTimeConstant = 0.4; // 動きを少し滑らかに
                
                microphone.connect(analyser);
                
                isMeasuring = true;
                updateUIState(true);
                updateMeter();
            } catch (err) {
                console.error('Error accessing microphone:', err);
                statusMessage.textContent = 'エラー: マイクを使用できません';
                statusMessage.classList.add('text-red-400', 'bg-red-900/20');
            }
        }

        function updateUIState(active) {
            if (active) {
                toggleBtn.textContent = '一時停止';
                toggleBtn.className = "w-full py-4 bg-red-600 hover:bg-red-500 active:scale-[0.98] transition-all rounded-2xl font-bold text-lg shadow-lg shadow-red-900/40";
                statusMessage.textContent = '測定中... マイクに向かって話してください';
                statusMessage.className = "text-sm text-center mb-6 py-2 px-4 bg-green-900/20 rounded-full text-green-400 border border-green-500/30";
            } else {
                toggleBtn.textContent = '測定再開';
                toggleBtn.className = "w-full py-4 bg-blue-600 hover:bg-blue-500 active:scale-[0.98] transition-all rounded-2xl font-bold text-lg shadow-lg shadow-blue-900/40";
                statusMessage.textContent = '停止中';
                statusMessage.className = "text-sm text-center mb-6 py-2 px-4 bg-slate-700 rounded-full text-slate-300 border border-transparent";
            }
        }

        function stopMeasurement() {
            isMeasuring = false;
            if (audioContext) {
                audioContext.suspend();
            }
            cancelAnimationFrame(animationId);
            updateUIState(false);
        }

        function updateMeter() {
            if (!isMeasuring) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            // 実効値(RMS)に近い計算で音量を算出
            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i] * dataArray[i];
            }
            let rms = Math.sqrt(sum / bufferLength);
            
            // 0-255の入力を0-140の相対dBスケールにマッピング
            // (マイク感度やOS設定に依存するため、あくまで相対的な指標)
            let volume = Math.round((rms / 180) * 140);
            
            // 負の値を防ぐ
            if (volume < 0) volume = 0;

            // 表示更新
            dbDisplay.textContent = volume;
            
            // メーターバーの幅（140を100%とする）
            const barWidth = Math.min((volume / 140) * 100, 100);
            meterBar.style.width = barWidth + '%';

            // 色とエフェクトの調整
            if (volume > 110) {
                meterBar.style.filter = 'brightness(1.5) saturate(1.5)';
                dbDisplay.className = "text-7xl font-black tabular-nums tracking-tighter text-red-500 drop-shadow-[0_0_10px_rgba(239,68,68,0.5)]";
            } else if (volume > 80) {
                meterBar.style.filter = 'brightness(1.2)';
                dbDisplay.className = "text-7xl font-black tabular-nums tracking-tighter text-yellow-400";
            } else {
                meterBar.style.filter = 'none';
                dbDisplay.className = "text-7xl font-black tabular-nums tracking-tighter text-white";
            }

            // 統計更新
            if (volume > 2) { 
                if (volume > maxVolume) {
                    maxVolume = volume;
                    maxDisplay.textContent = maxVolume;
                }
                totalVolume += volume;
                samples++;
                avgDisplay.textContent = Math.round(totalVolume / samples);
            }

            animationId = requestAnimationFrame(updateMeter);
        }

        toggleBtn.addEventListener('click', () => {
            if (isMeasuring) {
                stopMeasurement();
            } else {
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                    isMeasuring = true;
                    updateUIState(true);
                    updateMeter();
                } else {
                    startMeasurement();
                }
            }
        });

        resetBtn.addEventListener('click', () => {
            maxVolume = 0;
            totalVolume = 0;
            samples = 0;
            maxDisplay.textContent = '0';
            avgDisplay.textContent = '0';
            dbDisplay.textContent = '0';
            meterBar.style.width = '0%';
        });
    </script>
</body>
</html>
