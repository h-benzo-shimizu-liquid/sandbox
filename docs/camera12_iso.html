<!DOCTYPE html>
<html><head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>テスト</title>
	<style type="text/css">
		body { margin: 20px; background-color: pink; }
	</style>
</head><body>
	<div id="root">
		<div>isoを動的に変えてみる</div>
		<div>
			<button id="testButtonReady">ready</button>
			<select id="testSelect">
				<option value="none">未選択</option>
				<option value="user">user</option>
				<option value="environment">environment</option>
			</select>
			<button id="testButtonStart">start</button>
			<button id="testButtonCheck">確認</button>
			<button id="testButtonShoot">撮影</button>
		</div>
		<div><video id="testVideo" width="256" height="256" autoplay muted playsinline></video></div>
		<table>
			<tbody>
				<tr>
					<td>iso</td>
					<td><input id="testInputIso" type="range" min="0" max="100" step="1"></input></td>
				</tr>
				<tr>
					<td>exposureTime</td>
					<td><input id="testInputExp" type="range" min="0" max="100" step="1"></input></td>
				</tr>
				<tr>
					<td>frameRate</td>
					<td><input id="testInputFps" type="range" min="0" max="100" step="1"></input></td>
				</tr>
			</tbody>
		</table>
		<div><textarea id="testTextarea" rows="20" cols="40"></textarea></div>
		<div id="testDivImg"></div>
	</div>
	<script type="text/javascript">
// ----------------------------------------------------------------
// ----------------------------------------------------------------
// ----------------------------------------------------------------

// 処理はここから始まる
document.addEventListener('DOMContentLoaded', (event) => {
	const testButtonReady = document.getElementById('testButtonReady');
	const testButtonStart = document.getElementById('testButtonStart');
	const testButtonCheck = document.getElementById('testButtonCheck');
	const testButtonShoot = document.getElementById('testButtonShoot');
	const testSelect = document.getElementById('testSelect');
	const testVideo = document.getElementById('testVideo');
	const testTextarea = document.getElementById('testTextarea');
	const testDivImg = document.getElementById('testDivImg');

	const entries = [];
	entries.push({ input: document.getElementById('testInputIso'), key: 'iso', });
	entries.push({ input: document.getElementById('testInputExp'), key: 'exposureTime', });
	entries.push({ input: document.getElementById('testInputFps'), key: 'frameRate', });

	let track = null;
	let capabilities = null;
	let imageCapture = null;

	Promise.resolve().then(() => {
		// 使わないボタンの無効化
		testButtonStart.disabled = true;
		testButtonCheck.disabled = true;
		testButtonShoot.disabled = true;
		testSelect.disabled = true;
		entries.forEach(entry => { entry.input.disabled = true; });
	}).then(() => new Promise((resolve, reject) => {
		// クリック待ち
		testButtonReady.addEventListener('click', resolve);
	})).then(() => {
		// 使わなくなったボタンの無効化
		testButtonReady.disabled = true;
	}).then(() => {
		// 権限取得のためのデバイス開始
		const constraints = {};
		constraints.video = true;
		constraints.audio = false;
		return navigator.mediaDevices.getUserMedia(constraints);
	}).then((stream) => {
		// 権限取得によりデバイス停止
		stream.getTracks().forEach((track) => track.stop());
	}).then(() => {
		// デバイス一覧の取得
		return navigator.mediaDevices.enumerateDevices();
	}).then((devices) => {
		// デバイス一覧からセレクトボックスの作成
		for (let i = 0; i < devices.length; i++) {
			if (devices[i].kind !== 'videoinput') { continue; }
			testSelect.appendChild((() => {
				const element = document.createElement('option');
				element.value = JSON.stringify(devices[i]);
				element.innerHTML = devices[i].label;
				return element;
			})());
		}
	}).then(() => {
		// これから使うボタンの有効化
		testButtonStart.disabled = false;
		testSelect.disabled = false;
	}).then(() => new Promise((resolve, reject) => {
		// 選択とクリック待ち
		testButtonStart.addEventListener('click', resolve);
	})).then(() => {
		// 使わなくなったボタンの無効化
		testButtonStart.disabled = true;
		testSelect.disabled = true;
	}).then(() => {
		// 撮影のためのデバイス開始
		const constraints = {};
		constraints.audio = false;

		if (testSelect.value === 'none') {
			constraints.video = true;
		} else if (testSelect.value === 'user') {
			constraints.video = { facingMode: 'user', };
		} else if (testSelect.value === 'environment') {
			constraints.video = { facingMode: 'environment', };
		} else {
			const device = JSON.parse(testSelect.value);
			constraints.video = { deviceId: { exact: device.deviceId, }, };
		}

		return navigator.mediaDevices.getUserMedia(constraints);
	}).then((stream) => new Promise((resolve, reject) => {
		// デバイス開始により取得したストリームの処理
		track = stream.getVideoTracks()[0];
		capabilities = track.getCapabilities();
		imageCapture = new ImageCapture(track);
		testVideo.addEventListener('loadedmetadata', resolve);
		testVideo.srcObject = stream;
	})).then(() => {
		// 最初に状態を表示
		const settings = track.getSettings();
		testTextarea.value = JSON.stringify({
			ua: navigator.userAgent,
			settings: Object.fromEntries(entries.map(entry => [entry.key, settings[entry.key],])),
			capabilities: Object.fromEntries(entries.map(entry => [entry.key, capabilities[entry.key],])),
		}, null, 2);
	}).then(() => {
		// スライダー設定
		entries.forEach(entry => {
			if (capabilities[entry.key] === undefined) { return; }

			entry.input.disabled = false;
			entry.input.addEventListener('change', () => {
				const inputMin = Number(entry.input.min);
				const inputMax = Number(entry.input.max);
				const cameraMin = capabilities[entry.key].min;
				const cameraMax = capabilities[entry.key].max;
				const ratio = (Number(entry.input.value) - inputMin) / (inputMax - inputMin);
				const value = ratio * (cameraMax - cameraMin) + cameraMin;

				const constraints = {};
				constraints[entry.key] = { ideal: value, };

				track.applyConstraints(constraints).then(() => {
					const settings1 = track.getSettings();
					const settings2 = entries.map(entry => [entry.key, settings1[entry.key],]);
					const settings3 = Object.fromEntries(settings2);
					testTextarea.value = JSON.stringify(settings3, null, 2);
				});
			});
		});
	}).then(() => {
		// 確認ボタン設定
		testButtonCheck.disabled = false;
		testButtonCheck.addEventListener('click', () => {
			const settings = track.getSettings();
			testTextarea.value = JSON.stringify(settings, null, 2);
		});
	}).then(() => {
		// 撮影ボタン設定
		testButtonShoot.disabled = false;
		testButtonShoot.addEventListener('click', () => {
			imageCapture.takePhoto().then(blob => {
				testDivImg.appendChild((() => {
					const element = document.createElement('img');
					element.height = 100;
					element.src = URL.createObjectURL(blob);
					return element;
				})());
			});
		});
	});
});

// ----------------------------------------------------------------
// ----------------------------------------------------------------
// ----------------------------------------------------------------
	</script>
</body></html>
